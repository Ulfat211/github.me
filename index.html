<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calm Positive Vibes</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #c2e9fb, #a1c4fd);
        overflow: hidden;
        text-align: center;
    }

    h1 {
        color: white;
        max-width: 750px;
        line-height: 1.6;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        margin-bottom: 30px;
    }

    button {
        padding: 18px 40px;
        font-size: 18px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(45deg, #ff6a88, #ff99ac);
        color: white;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        transition: 0.3s;
        position: relative;
    }

    button:hover {
        transform: scale(1.1);
    }

    .effect {
        position: absolute;
        font-size: 28px;
        font-weight: bold;
        pointer-events: none;
        animation: floatSlow 4s ease-out forwards;
        white-space: nowrap;
        text-shadow: 2px 2px 12px rgba(0,0,0,0.3);
    }

    @keyframes floatSlow {
        0% {
            opacity: 1;
            transform: translate(0,0) scale(1);
        }
        100% {
            opacity: 0;
            transform: translate(var(--x), var(--y)) scale(2);
        }
    }
</style>
</head>

<body>

<h1>
We have completed our project. Whatever happens, we’ll handle it — no tension at all 💖
</h1>

<button onclick="showMagic(event)">
Click me to reduce your tension 💕
</button>

<script>
function showMagic(e) {
    const btn = e.target;

    const items = [
        "❤️ Heart",
        "🦋 Butterfly",
        "💖 You are so beautiful",
        "😊 Just smile",
        "💕 Stay happy",
        "✨ You are amazing",
        "🌸 Be calm and happy"
    ];

    const rect = btn.getBoundingClientRect();
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    for (let i = 0; i < 45; i++) {
        let el = document.createElement("span");
        el.className = "effect";

        // slower appearance (staggered feel)
        setTimeout(() => {
            el.innerHTML = items[Math.floor(Math.random() * items.length)];

            let x = (Math.random() - 0.5) * 900 + "px";
            let y = (Math.random() - 1) * 900 + "px";

            el.style.setProperty('--x', x);
            el.style.setProperty('--y', y);

            el.style.left = centerX + "px";
            el.style.top = centerY + "px";

            btn.appendChild(el);

            setTimeout(() => el.remove(), 4000);
        }, i * 80);
    }
}
</script>

</body>
</html>
